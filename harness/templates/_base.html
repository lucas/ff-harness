<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Harness{% endblock %}</title>
  <style>
    :root {
      --fg: #111827;
      --fg-muted: #4b5563;
      --fg-faint: #6b7280;
      --bg: #f9fafb;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --pass: #16a34a;
      --fail: #dc2626;
      --warn: #d97706;
      --neutral: #6b7280;
      --critical: #991b1b;
      --highlight-bg: #fef3c7;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--fg);
      background: var(--bg);
      font-size: 14px;
      line-height: 1.5;
    }
    nav.topnav {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
    }
    nav.topnav .container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    nav.topnav a {
      color: var(--fg);
      text-decoration: none;
      font-weight: 600;
    }
    nav.topnav a:hover { color: var(--accent); }
    main.container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    h1, h2, h3 { margin: 0 0 12px 0; }
    h1 { font-size: 22px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }
    a { color: var(--accent); }
    a:hover { color: var(--accent-hover); }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
    }
    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      font-weight: 600;
      color: var(--fg-muted);
      background: var(--bg);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .card h2 { margin-top: 0; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--neutral);
      color: white;
    }
    .badge.pass, .badge.completed, .badge.active { background: var(--pass); }
    .badge.fail, .badge.failed { background: var(--fail); }
    .badge.awaiting_human, .badge.warning { background: var(--warn); }
    .badge.error { background: var(--fail); }
    .badge.critical { background: var(--critical); }
    .badge.neutral { background: var(--neutral); }
    .badge.stage { background: var(--accent); }
    .badge.swapped { background: var(--warn); color: white; }
    button, .btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
    }
    button:hover, .btn:hover { background: var(--accent-hover); color: white; }
    button.secondary, .btn.secondary {
      background: var(--bg-card);
      color: var(--fg);
      border: 1px solid var(--border);
    }
    button.secondary:hover, .btn.secondary:hover { background: var(--bg); color: var(--fg); }
    button.danger { background: var(--fail); }
    input[type=text], textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
    }
    textarea { min-height: 80px; resize: vertical; }
    code, pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .id-short { font-family: ui-monospace, monospace; color: var(--fg-muted); }
    .muted { color: var(--fg-faint); }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .event-row.event-model_swapped {
      background: var(--highlight-bg);
    }
    details > summary {
      cursor: pointer;
      color: var(--fg-muted);
      font-size: 12px;
    }
    .empty {
      color: var(--fg-faint);
      font-style: italic;
      padding: 8px 0;
    }

    /* ---- Chat-first layout ---- */
    .chat-panel {
      display: flex;
      flex-direction: column;
      min-height: 60vh;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 16px;
    }
    .chat-log {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      overflow-y: auto;
      max-height: 70vh;
    }
    .chat-msg {
      display: flex;
      flex-direction: column;
      max-width: 70%;
    }
    .chat-msg.user {
      align-self: flex-end;
      align-items: flex-end;
    }
    .chat-msg.agent {
      align-self: flex-start;
      align-items: flex-start;
    }
    .chat-bubble {
      padding: 8px 12px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }
    .chat-msg.user .chat-bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.agent .chat-bubble {
      background: #f1f3f5;
      color: var(--fg);
      border-bottom-left-radius: 4px;
    }
    .chat-time {
      font-size: 10px;
      color: var(--fg-faint);
      margin: 2px 4px;
      font-variant-numeric: tabular-nums;
    }
    .chat-msg .tag {
      display: inline-block;
      margin-top: 4px;
      padding: 1px 6px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--neutral);
      color: white;
    }
    .chat-msg .tag.final { background: var(--pass); }
    .chat-msg .tag.escalate { background: var(--warn); }
    .chat-options {
      margin-top: 6px;
      font-size: 12px;
      color: var(--fg-muted);
    }
    .chat-input {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      background: var(--bg-card);
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
    }
    .chat-input .pending-q {
      margin-bottom: 8px;
      color: var(--fg);
    }
    .chat-input .pending-q.continuation {
      background: #fef3c7;
      border-left: 3px solid var(--warn);
      padding: 8px 12px;
      border-radius: 4px;
    }
    .chat-input textarea {
      margin-bottom: 8px;
    }
    .chat-input textarea:disabled {
      background: var(--bg);
      color: var(--fg-faint);
      cursor: not-allowed;
    }
    .more-pending {
      font-size: 11px;
      color: var(--fg-faint);
      margin-top: 6px;
    }
    /* Events table — keep the model-swap highlight visible */
    .event-row.event-model_swapped { background: var(--highlight-bg); }
    .event-row.highlight { background: var(--highlight-bg); }
    .events-truncated-note { font-size: 11px; color: var(--fg-faint); padding: 4px 0; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="topnav">
    <div class="container">
      <a href="/">Harness</a>
      <a href="/">Sessions</a>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
